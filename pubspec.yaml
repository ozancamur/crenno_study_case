name: crenno_study_case
description: "Insurance mobile app MVP case study"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  # STATE MANAGEMENT
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  # NETWORK
  dio: ^5.9.2
  # ROUTER
  go_router: ^17.2.1
  # DEPENDENCY INJECTION
  get_it: ^9.2.1
  # LOCALIZATION
  easy_localization: ^3.0.8
  # UI
  auto_size_text: ^3.0.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
